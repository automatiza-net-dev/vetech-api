name: Deploy

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug SSH Setup
        run: |
          set -x  # Enable debug mode to see each command
          echo "Creating .ssh directory..."
          mkdir -p ~/.ssh
          ls -la ~/.ssh

          echo "Installing SSH key..."
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ls -la ~/.ssh/id_rsa

          echo "Adding host key..."
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts || echo "ssh-keyscan failed with $?"
          chmod 644 ~/.ssh/known_hosts
          ls -la ~/.ssh/known_hosts

          echo "Testing SSH key format..."
          ssh-keygen -l -f ~/.ssh/id_rsa || echo "Invalid key format"

          echo "Checking SSH configuration..."
          ssh -v -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.DEV_HOST }} exit 2>&1 || echo "SSH test failed with $?"

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd ${{ secrets.FOLDER }}
            git pull origin ${{ github.ref_name }}
            yarn
            rm -rf dist
            yarn build
            cp .env build/.env
            cp -r public build/public
            export NODE_ENV=production
            node ace migration:run
            pm2 restart ${{ secrets.APP }}
            pm2 restart cron

      # - name: Notify Discord
      #   if: always()
      #   run: |
      #     STATUS="🔴 Falhou [dev]"
      #     if [ "${{ job.status }}" == "success" ]; then STATUS="✅ Sucesso [dev]"; fi
      #     curl -H "Content-Type: application/json" -d "{\"content\": \"$STATUS - ${{ github.workflow }}\"}" \
      #     ${{ secrets.DEV_DISCORD_WEBHOOK }}

